<!DOCTYPE html>
<!-- IHS ECOSYSTEM · Medjat Library · medjat.irokosociety.org/library/featured/archive/ -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prior Featured Works · Medjat Library · Iroko Historical Society</title>
  <meta name="description" content="A date-ordered archive of works previously featured in the Medjat Library.">
  <link rel="canonical" href="https://medjat.irokosociety.org/library/featured/archive/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Per Medjat · Iroko Historical Society">
  <meta property="og:title" content="Prior Featured Works · Medjat Library">
  <meta property="og:description" content="A date-ordered archive of works previously featured in the Medjat Library.">
  <meta property="og:url" content="https://medjat.irokosociety.org/library/featured/archive/">
  <meta property="og:image" content="https://medjat.irokosociety.org/assets/IHS-Logo.jpg">
  <link rel="stylesheet" href="https://ontology.irokosociety.org/assets/iroko-style.css">
  <style>
    .archive-hero { padding: 3rem 0 2rem; border-bottom: 2px solid var(--ink); margin-bottom: 2.5rem; }
    .archive-eyebrow { font-family: var(--mono); font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; color: var(--green-mid); margin-bottom: .75rem; }
    .archive-eyebrow a { color: inherit; text-decoration: none; }
    .archive-eyebrow a:hover { text-decoration: underline; }
    .archive-title { font-family: var(--serif); font-size: clamp(1.8rem,3.5vw,2.6rem); font-weight: 600; color: var(--green); line-height: 1.05; margin-bottom: .5rem; }
    .archive-sub { font-size: .9rem; color: var(--ink-mid); line-height: 1.75; max-width: 60ch; }

    .archive-list { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 4rem; }

    .archive-entry { border: 1px solid var(--rule-strong); border-radius: 3px; background: var(--paper); display: grid; grid-template-columns: 88px 1fr; gap: 1.25rem; padding: 1.15rem 1.35rem; align-items: start; }

    .archive-cover { border: 1px solid var(--rule-strong); background: var(--paper-deep); aspect-ratio: 2 / 3; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .archive-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .archive-cover-fallback { display: none; font-family: var(--serif); font-size: .78rem; font-weight: 600; line-height: 1.2; text-align: center; color: var(--green); padding: .65rem; }

    .archive-label { font-family: var(--mono); font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); background: var(--gold-light); border: 1px solid rgba(160,120,48,.25); padding: .15em .55em; border-radius: 2px; display: inline-block; margin-bottom: .6rem; }
    .archive-entry-title { font-family: var(--serif); font-size: 1.15rem; font-weight: 600; color: var(--green); line-height: 1.15; margin-bottom: .2rem; }
    .archive-entry-author { font-size: .82rem; color: var(--ink-mid); margin-bottom: .55rem; }
    .archive-entry-desc { font-size: .84rem; color: var(--ink-mid); line-height: 1.65; max-width: 72ch; }
    .archive-entry-meta { font-family: var(--mono); font-size: .6rem; letter-spacing: .04em; color: var(--ink-soft); margin-top: .55rem; }

    .archive-entry-actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-top: .85rem; }
    .archive-share-actions { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }

    .archive-cta { font-family: var(--mono); font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: #f0ece0; background: var(--terracotta); border: 1px solid var(--terracotta); padding: .32em .9em; border-radius: 2px; text-decoration: none; white-space: nowrap; transition: all .12s; cursor: pointer; }
    .archive-cta:hover { background: #8b3a1a; border-color: #8b3a1a; color: #fff; }

    .archive-empty { font-family: var(--mono); font-size: .8rem; color: var(--ink-soft); font-style: italic; padding: 2rem 0; }

    @media (max-width: 540px) {
      .archive-entry { grid-template-columns: 1fr; }
      .archive-cover { width: 88px; }
      .archive-share-actions { justify-content: flex-start; margin-left: 0; }
    }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S7WFXNP22P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S7WFXNP22P');
  </script>
</head>
<body>
  <div class="site-container">

    <header class="archive-hero">
      <p class="archive-eyebrow">
        <a href="../../">Medjat Library</a> · Per Medjat · Iroko Historical Society
      </p>
      <h1 class="archive-title">Prior Featured Works</h1>
      <p class="archive-sub">Works previously featured in the Medjat Library, ordered from most to least recent.</p>
    </header>

    <main id="archive-list" class="archive-list" aria-label="Prior featured works">
      <p class="archive-empty">Loading archive…</p>
    </main>

  </div>

  <script>
    const ARCHIVE_URL = 'archive.json';

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function shareEntry(btn) {
      const url = btn.dataset.shareUrl || window.location.href;
      const title = btn.dataset.shareTitle || 'Prior Featured Work · Medjat Library';
      const text = btn.dataset.shareText || title;
      if (navigator.share) {
        try {
          await navigator.share({ title, text, url });
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') return;
        }
      }
      copyEntryLink(btn);
    }

    async function copyEntryLink(btn) {
      const url = btn.dataset.shareUrl || window.location.href;
      const old = btn.textContent;
      const markCopied = (label = 'Copied') => {
        btn.textContent = label;
        setTimeout(() => { btn.textContent = old; }, 1800);
      };
      try {
        await navigator.clipboard.writeText(url);
        markCopied();
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:fixed;top:-1000px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand && document.execCommand('copy');
        ta.remove();
        markCopied(ok ? 'Copied' : 'Link ready');
      }
    }

    function renderEntry(work) {
      const cover = work.cover || {};
      const hasCover = !!cover.url;
      const date = formatDate(work.featuredDate);
      const meta = [work.genre, work.isbn ? `ISBN ${work.isbn}` : '', date ? `Featured ${date}` : ''].filter(Boolean).join(' · ');
      const shareUrl = work.shareUrl || work.recordUrl || window.location.href;
      const shareTitle = `Prior Featured Work from the Medjat Library: ${work.title}`;
      const shareText = work.abstract || work.authorLine || shareTitle;
      const emailSubject = encodeURIComponent(shareTitle);
      const emailBody = encodeURIComponent(`${shareTitle}\n\n${shareText}\n\n${shareUrl}`);

      return `
        <article class="archive-entry">
          <div class="archive-cover">
            ${hasCover ? `<img src="${esc(cover.url)}" alt="${esc(cover.alt || 'Cover image')}" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">` : ''}
            <div class="archive-cover-fallback" style="${hasCover ? '' : 'display:block'}">${esc(work.shortTitle || work.title)}</div>
          </div>
          <div>
            <span class="archive-label">${esc(work.label || 'Prior Featured Work')}</span>
            <h2 class="archive-entry-title">${esc(work.title)}</h2>
            ${work.authorLine ? `<p class="archive-entry-author">${esc(work.authorLine)}</p>` : ''}
            ${work.abstract ? `<p class="archive-entry-desc">${esc(work.abstract)}</p>` : ''}
            ${meta ? `<p class="archive-entry-meta">${esc(meta)}</p>` : ''}
            <div class="archive-entry-actions">
              ${work.recordUrl ? `<a class="archive-cta" href="${esc(work.recordUrl)}" target="_blank" rel="noopener">View catalog record</a>` : ''}
              <span class="archive-share-actions">
                <button class="archive-cta" type="button"
                  data-share-url="${esc(shareUrl)}"
                  data-share-title="${esc(shareTitle)}"
                  data-share-text="${esc(shareText)}"
                  onclick="shareEntry(this)">Share</button>
                <button class="archive-cta" type="button"
                  data-share-url="${esc(shareUrl)}"
                  onclick="copyEntryLink(this)">Copy link</button>
                <a class="archive-cta" href="mailto:?subject=${emailSubject}&body=${emailBody}">Email</a>
              </span>
            </div>
          </div>
        </article>`;
    }

    async function loadArchive() {
      const list = document.getElementById('archive-list');
      try {
        const res = await fetch(ARCHIVE_URL);
        if (!res.ok) throw new Error(res.status);
        const works = await res.json();
        if (!Array.isArray(works) || works.length === 0) {
          list.innerHTML = '<p class="archive-empty">No prior featured works yet.</p>';
          return;
        }
        works.sort((a, b) => (b.featuredDate || '').localeCompare(a.featuredDate || ''));
        list.innerHTML = works.map(renderEntry).join('');
      } catch (err) {
        list.innerHTML = '<p class="archive-empty">Archive unavailable.</p>';
        console.warn('[Per-Medjat] featured-works-archive.json unavailable', err);
      }
    }

    loadArchive();
  </script>
</body>
</html>
